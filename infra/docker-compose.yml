services:
  postgres:
    image: postgres:15
    container_name: tourism-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tourism_db
      POSTGRES_USER: tourism_user
      POSTGRES_PASSWORD: tourism_pass
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - tourism_pgdata:/var/lib/postgresql/data

volumes:
  tourism_pgdata:
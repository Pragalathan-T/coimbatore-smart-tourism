spring:
  application:
    name: tourism

  datasource:
    url: jdbc:postgresql://localhost:5432/tourism_db?options=-c%20TimeZone=UTC
    username: tourism_user
    password: tourism_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: true

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/tourism_db?options=-c%20TimeZone=UTC
    user: tourism_user
    password: tourism_pass
    validate-on-migrate: true

server:
  port: 8080

app:
  security:
    jwt:
      secret: ${JWT_SECRET:abcdefghijklmnopqrstuvwxyz1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ12}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
